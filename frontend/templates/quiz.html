<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT 문제은행 - 퀴즈</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

<header class="site-header quiz-header">
  <div class="container header-inner">
    <a href="/" class="logo">
      <i class="fa-solid fa-server"></i>
      <span>IT 문제은행</span>
    </a>
    <div class="quiz-meta">
      <span id="metaUser"><i class="fa-solid fa-user"></i> <span id="displayName">-</span></span>
      <span id="metaCat"><i class="fa-solid fa-folder"></i> <span id="displayCat">-</span></span>
    </div>
  </div>
</header>

<div class="progress-wrap">
  <div class="progress-bar" id="progressBar" style="width:0%"></div>
</div>
<div class="progress-label container">
  <span id="progressText">문제 1 / ?</span>
  <span id="progressPct">0%</span>
</div>

<main class="container main-content">
  <div id="loadingBox" class="loading-box">
    <i class="fa-solid fa-spinner fa-spin fa-3x"></i>
    <p>문제를 불러오는 중...</p>
  </div>

  <section id="quizCard" class="quiz-card card" style="display:none">
    <div class="question-header">
      <span class="q-badge" id="qBadge">Q1</span>
      <span class="q-category" id="qCategory"></span>
    </div>

    <p class="question-text" id="questionText"></p>

    <ul class="choices" id="choiceList"></ul>

    <div class="quiz-actions">
      <button id="prevBtn" class="btn btn-secondary" disabled>
        <i class="fa-solid fa-arrow-left"></i> 이전
      </button>
      <button id="nextBtn" class="btn btn-primary" disabled>
        다음 <i class="fa-solid fa-arrow-right"></i>
      </button>
      <button id="submitBtn" class="btn btn-success" style="display:none" disabled>
        <i class="fa-solid fa-flag-checkered"></i> 채점하기
      </button>
    </div>
  </section>

  <div id="errorBox" class="error-box" style="display:none">
    <i class="fa-solid fa-triangle-exclamation fa-2x"></i>
    <p id="errorMsg"></p>
    <a href="/" class="btn btn-primary">처음으로 돌아가기</a>
  </div>
</main>

<script>
const API_BASE = "/api";

const CATEGORY_LABEL = {
  network: "네트워크",
  infra: "인프라",
  linux: "리눅스",
};

const pathParts = window.location.pathname.split("/");
const CATEGORY = pathParts[pathParts.length - 1] || sessionStorage.getItem("category");
const params = new URLSearchParams(window.location.search);
const LIMIT = parseInt(params.get("limit") || sessionStorage.getItem("questionCount") || "10", 10);
const USER_NAME = sessionStorage.getItem("userName") || "익명";

let questions = [];
let current = 0;
let userAnswers = {};

document.getElementById("displayName").textContent = USER_NAME;
document.getElementById("displayCat").textContent = CATEGORY_LABEL[CATEGORY] || CATEGORY;

async function loadQuestions() {
  try {
    const userParam = encodeURIComponent(USER_NAME);
    let res = await fetch(`${API_BASE}/questions/${CATEGORY}?limit=${LIMIT}&shuffle=1&source=ai&user=${userParam}`);
    let data = await res.json().catch(() => ({}));

    // Fallback path when AI generation is slow or temporarily failing.
    if (!res.ok) {
      res = await fetch(`${API_BASE}/questions/${CATEGORY}?limit=${LIMIT}&shuffle=1&source=auto&user=${userParam}`);
      data = await res.json().catch(() => ({}));
    }
    if (!res.ok) {
      const detail = data.ai_error ? ` - ${data.ai_error}` : "";
      throw new Error((data.error || `서버 오류 (${res.status})`) + detail);
    }

    if (!data.questions || data.questions.length === 0) {
      throw new Error("문제를 찾을 수 없습니다.");
    }
    if (data.questions.length < LIMIT) {
      // One more strict retry; do not start quiz with insufficient count.
      const retry = await fetch(`${API_BASE}/questions/${CATEGORY}?limit=${LIMIT}&shuffle=1&source=auto&user=${userParam}`);
      const retryData = await retry.json().catch(() => ({}));
      if (!retry.ok || !retryData.questions || retryData.questions.length < LIMIT) {
        throw new Error(`선택한 ${LIMIT}문제를 준비하지 못했습니다. 잠시 후 다시 시도해주세요.`);
      }
      data = retryData;
    }

    questions = data.questions;
    document.getElementById("loadingBox").style.display = "none";
    document.getElementById("quizCard").style.display = "block";
    renderQuestion(0);
  } catch (e) {
    document.getElementById("loadingBox").style.display = "none";
    document.getElementById("errorBox").style.display = "flex";
    document.getElementById("errorMsg").textContent = e.message;
  }
}

function renderQuestion(idx) {
  const q = questions[idx];
  const total = questions.length;
  const pct = Math.round(((idx + 1) / total) * 100);

  document.getElementById("progressBar").style.width = pct + "%";
  document.getElementById("progressText").textContent = `문제 ${idx + 1} / ${total}`;
  document.getElementById("progressPct").textContent = pct + "%";

  document.getElementById("qBadge").textContent = `Q${idx + 1}`;
  document.getElementById("qCategory").textContent = CATEGORY_LABEL[q.category] || q.category;
  document.getElementById("questionText").textContent = q.question;

  const choiceList = document.getElementById("choiceList");
  choiceList.innerHTML = "";
  const savedAnswer = userAnswers[q.id];

  ["A", "B", "C", "D"].forEach(key => {
    const li = document.createElement("li");
    li.className = "choice-item" + (savedAnswer === key ? " selected" : "");
    li.dataset.key = key;
    li.innerHTML = `
      <span class="choice-key">${key}</span>
      <span class="choice-text">${q.choices[key]}</span>
    `;
    li.addEventListener("click", () => selectChoice(q.id, key));
    choiceList.appendChild(li);
  });

  document.getElementById("prevBtn").disabled = idx === 0;
  const nextBtn = document.getElementById("nextBtn");
  const submitBtn = document.getElementById("submitBtn");

  if (idx === total - 1) {
    nextBtn.style.display = "none";
    submitBtn.style.display = "inline-flex";
  } else {
    nextBtn.style.display = "inline-flex";
    submitBtn.style.display = "none";
  }

  nextBtn.disabled = !savedAnswer;
  submitBtn.disabled = !savedAnswer;
}

function selectChoice(questionId, key) {
  userAnswers[questionId] = key;
  document.querySelectorAll(".choice-item").forEach(li => {
    li.classList.toggle("selected", li.dataset.key === key);
  });
  document.getElementById("nextBtn").disabled = false;
  document.getElementById("submitBtn").disabled = false;
}

document.getElementById("prevBtn").addEventListener("click", () => {
  if (current > 0) {
    current--;
    renderQuestion(current);
  }
});

document.getElementById("nextBtn").addEventListener("click", () => {
  if (current < questions.length - 1) {
    current++;
    renderQuestion(current);
  }
});

document.getElementById("submitBtn").addEventListener("click", async () => {
  const unanswered = questions.filter(q => !userAnswers[q.id]);
  if (unanswered.length > 0) {
    const go = confirm(`아직 ${unanswered.length}개의 문제를 선택하지 않았습니다. 제출할까요?`);
    if (!go) return;
  }

  const payload = {
    user_name: USER_NAME,
    category: CATEGORY,
    answers: questions.map(q => ({
      id: q.id,
      selected: userAnswers[q.id] || "",
    })),
  };

  try {
    const res = await fetch(`${API_BASE}/submit`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error(`채점 실패 (${res.status})`);
    const data = await res.json();
    sessionStorage.setItem("quizResult", JSON.stringify(data));
    window.location.href = "/result";
  } catch (e) {
    alert("제출 중 오류: " + e.message);
  }
});

loadQuestions();
</script>
</body>
</html>
