<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT 문제은행 - 퀴즈</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

<header class="site-header quiz-header">
  <div class="container header-inner">
    <a href="/" class="logo">
      <i class="fa-solid fa-server"></i>
      <span>IT 문제은행</span>
    </a>
    <!-- 진행률 (중앙) -->
    <div class="quiz-progress-center" id="quizProgressCenter" style="display:none">
      <span id="progressText" style="font-size:1rem;font-weight:600;color:var(--primary-light);">문제 1 / ?</span>
      <span style="color:var(--text-muted);font-size:0.9rem;margin-left:10px;" id="progressPct">0%</span>
    </div>
    <div class="quiz-meta">
      <span id="metaUser"><i class="fa-solid fa-user"></i> <span id="displayName">-</span></span>
      <span id="metaCat"><i class="fa-solid fa-folder"></i> <span id="displayCat">-</span></span>
      <!-- 타이머 -->
      <span id="timerWrap" style="display:none">
        <i class="fa-solid fa-stopwatch"></i>
        <span id="timerDisplay" style="font-variant-numeric:tabular-nums;font-weight:600">00:00</span>
      </span>
    </div>
  </div>
</header>

<div class="progress-wrap">
  <div class="progress-bar" id="progressBar" style="width:0%"></div>
</div>

<main class="container main-content">
  <div id="loadingBox" class="loading-box">
    <i class="fa-solid fa-spinner fa-spin fa-3x"></i>
    <p id="loadingMsg">문제를 불러오는 중...</p>
  </div>

  <section id="quizCard" class="quiz-card card" style="display:none">
    <div class="question-header">
      <span class="q-badge" id="qBadge">Q1</span>
      <span class="q-category" id="qCategory"></span>
    </div>
    <p class="question-text" id="questionText"></p>
    <ul class="choices" id="choiceList"></ul>

    <div class="quiz-actions">
      <button id="prevBtn" class="btn btn-secondary" disabled>
        <i class="fa-solid fa-arrow-left"></i> 이전
      </button>
      <button id="nextBtn" class="btn btn-primary" disabled>
        다음 <i class="fa-solid fa-arrow-right"></i>
      </button>
      <button id="submitBtn" class="btn btn-success" style="display:none" disabled>
        <i class="fa-solid fa-flag-checkered"></i> 채점하기
      </button>
    </div>
  </section>

  <div id="errorBox" class="error-box" style="display:none">
    <i class="fa-solid fa-triangle-exclamation fa-2x"></i>
    <p id="errorMsg"></p>
    <a href="/" class="btn btn-primary">처음으로 돌아가기</a>
  </div>
</main>

<script>
const API_BASE = "/api";
const CATEGORY_LABEL = {
  all: "전체혼합",
  mixed: "전체혼합",
  programming: "프로그래밍",
  web: "웹개발",
  database: "데이터베이스",
  network: "네트워크",
  linux: "리눅스",
  cloud: "클라우드",
  kubernetes: "쿠버네티스",
  security: "보안",
  infra: "인프라",
  network_general: "네트워크",
  network_security: "보안",
  network_services: "네트워크",
  infra_general: "클라우드",
  infra_cloud: "클라우드",
  infra_kubernetes: "쿠버네티스",
  linux_general: "리눅스",
  linux_admin: "리눅스",
  linux_troubleshooting: "리눅스",
};

const pathParts  = window.location.pathname.split("/");
const CATEGORY   = pathParts[pathParts.length - 1] || sessionStorage.getItem("category");
const params     = new URLSearchParams(window.location.search);
const LIMIT      = parseInt(params.get("limit")      || sessionStorage.getItem("questionCount") || "10", 10);
const DIFFICULTY = params.get("difficulty") || sessionStorage.getItem("difficulty") || "mixed";
const QUESTION_STYLE = params.get("style") || sessionStorage.getItem("questionStyle") || "mixed";
const USER_NAME  = sessionStorage.getItem("userName") || "익명";
const IS_RETRY   = sessionStorage.getItem("retryMode") === "1";

let questions    = [];
let current      = 0;
let userAnswers  = {};

// ── 타이머 ─────────────────────────────────────────────────
let timerInterval = null;
let elapsedSec    = 0;

function startTimer() {
  document.getElementById("timerWrap").style.display = "flex";
  timerInterval = setInterval(() => {
    elapsedSec++;
    const m = String(Math.floor(elapsedSec / 60)).padStart(2, "0");
    const s = String(elapsedSec % 60).padStart(2, "0");
    document.getElementById("timerDisplay").textContent = `${m}:${s}`;
  }, 1000);
}

function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
}

// ── 헤더 표시 ──────────────────────────────────────────────
document.getElementById("displayName").textContent = USER_NAME;
document.getElementById("displayCat").textContent  = CATEGORY_LABEL[CATEGORY] || CATEGORY;

// ── 문제 로드 ──────────────────────────────────────────────
async function loadQuestions() {
  const loadingMsg = document.getElementById("loadingMsg");

  try {
    let data;

    // 오답 재도전 모드
    if (IS_RETRY) {
      sessionStorage.removeItem("retryMode");
      const wrongIds = JSON.parse(sessionStorage.getItem("wrongIds") || "[]");
      if (!wrongIds.length) throw new Error("오답 목록이 없습니다.");
      loadingMsg.textContent = "오답 문제를 불러오는 중...";
      const res = await fetch(`${API_BASE}/retry-wrong`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ids: wrongIds }),
      });
      data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `서버 오류 (${res.status})`);

    // 전체 혼합 모드
    } else if (CATEGORY === "all") {
      loadingMsg.textContent = "전체 카테고리 문제를 준비하는 중...";
      const userParam = encodeURIComponent(USER_NAME);
      const res = await fetch(
        `${API_BASE}/questions/all/mixed?limit=${LIMIT}&shuffle=1&difficulty=${DIFFICULTY}&user=${userParam}`
          + `&style=${encodeURIComponent(QUESTION_STYLE)}`
      );
      data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `서버 오류 (${res.status})`);

    // 일반 카테고리 (DB 비율 자동)
    } else {
      loadingMsg.textContent = "문제를 준비하는 중...";
      const userParam = encodeURIComponent(USER_NAME);
      const res = await fetch(
        `${API_BASE}/questions/${CATEGORY}?limit=${LIMIT}&shuffle=1&difficulty=${DIFFICULTY}&user=${userParam}`
          + `&style=${encodeURIComponent(QUESTION_STYLE)}`
      );
      data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `서버 오류 (${res.status})`);
    }

    if (!data.questions || data.questions.length === 0) {
      throw new Error("문제를 찾을 수 없습니다. GEMINI_API_KEY가 설정되어 있는지 확인해주세요.");
    }

    questions = data.questions;
    document.getElementById("loadingBox").style.display = "none";
    document.getElementById("quizCard").style.display   = "block";

    // 출제 모드 표시
    if (data.provider === "gemini") {
      loadingMsg.textContent = `AI가 ${data.ai_count}문제를 새로 생성했습니다.`;
    } else if (data.provider === "hybrid") {
      loadingMsg.textContent = `AI ${data.ai_count}문제 + DB ${data.db_count}문제 혼합 출제`;
    }

    startTimer();
    renderQuestion(0);

  } catch (e) {
    document.getElementById("loadingBox").style.display = "none";
    document.getElementById("errorBox").style.display   = "flex";
    // 서버에서 온 에러 메시지가 있으면 그대로, 없으면 기본 안내
    const msg = e.message || "";
    if (msg.includes("503") || msg.includes("high demand") || msg.includes("일시적")) {
      document.getElementById("errorMsg").textContent = "AI 서버에 요청이 몰려 일시적으로 응답이 지연되고 있습니다. 잠시 후 다시 시도해주세요. (503)";
    } else if (msg.includes("429") || msg.includes("한도")) {
      document.getElementById("errorMsg").textContent = "AI 요청 한도를 초과했습니다. 잠시 후 다시 시도해주세요. (429)";
    } else if (msg.includes("timed out") || msg.includes("timeout") || msg.includes("backend timeout")) {
      document.getElementById("errorMsg").textContent = "문제 생성 시간이 초과되었습니다. 문제 수를 줄이거나 잠시 후 다시 시도해주세요.";
    } else if (msg) {
      document.getElementById("errorMsg").textContent = msg;
    } else {
      document.getElementById("errorMsg").textContent = "문제를 불러오는 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.";
    }
  }
}

// ── 문제 렌더링 ────────────────────────────────────────────
function renderQuestion(idx) {
  const q     = questions[idx];
  const total = questions.length;
  const pct   = Math.round(((idx + 1) / total) * 100);

  document.getElementById("progressBar").style.width  = pct + "%";
  document.getElementById("progressText").textContent = `문제 ${idx + 1} / ${total}`;
  document.getElementById("progressPct").textContent  = pct + "%";
  document.getElementById("quizProgressCenter").style.display = "flex";
  document.getElementById("qBadge").textContent       = `Q${idx + 1}`;
  document.getElementById("qCategory").textContent    = q.category_label || CATEGORY_LABEL[q.category] || q.category;
  document.getElementById("questionText").textContent = q.question;

  const choiceList  = document.getElementById("choiceList");
  choiceList.innerHTML = "";
  const savedAnswer = userAnswers[q.id];

  ["A", "B", "C", "D"].forEach(key => {
    const li = document.createElement("li");
    li.className = "choice-item" + (savedAnswer === key ? " selected" : "");
    li.dataset.key = key;
    li.innerHTML   = `
      <span class="choice-key">${key}</span>
      <span class="choice-text">${q.choices[key]}</span>
    `;
    li.addEventListener("click", () => selectChoice(q.id, key));
    choiceList.appendChild(li);
  });

  document.getElementById("prevBtn").disabled = idx === 0;
  const nextBtn   = document.getElementById("nextBtn");
  const submitBtn = document.getElementById("submitBtn");
  if (idx === total - 1) {
    nextBtn.style.display   = "none";
    submitBtn.style.display = "inline-flex";
  } else {
    nextBtn.style.display   = "inline-flex";
    submitBtn.style.display = "none";
  }
  nextBtn.disabled   = !savedAnswer;
  submitBtn.disabled = !savedAnswer;
}

function selectChoice(questionId, key) {
  userAnswers[questionId] = key;
  document.querySelectorAll(".choice-item").forEach(li => {
    li.classList.toggle("selected", li.dataset.key === key);
  });
  document.getElementById("nextBtn").disabled   = false;
  document.getElementById("submitBtn").disabled = false;
}

document.getElementById("prevBtn").addEventListener("click", () => {
  if (current > 0) { current--; renderQuestion(current); }
});
document.getElementById("nextBtn").addEventListener("click", () => {
  if (current < questions.length - 1) { current++; renderQuestion(current); }
});

// ── 채점 제출 ──────────────────────────────────────────────
document.getElementById("submitBtn").addEventListener("click", async () => {
  const unanswered = questions.filter(q => !userAnswers[q.id]);
  if (unanswered.length > 0) {
    const go = confirm(`아직 ${unanswered.length}개의 문제를 선택하지 않았습니다. 제출할까요?`);
    if (!go) return;
  }

  stopTimer();

  const payload = {
    user_name: USER_NAME,
    category:  CATEGORY === "all" ? "mixed" : CATEGORY,
    elapsed_sec: elapsedSec,
    answers: questions.map(q => ({ id: q.id, selected: userAnswers[q.id] || "" })),
  };

  try {
    const res = await fetch(`${API_BASE}/submit`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error(`채점 실패 (${res.status})`);
    const data = await res.json();
    data.elapsed_sec = elapsedSec;
    sessionStorage.setItem("quizResult", JSON.stringify(data));
    window.location.href = "/result";
  } catch (e) {
    alert("제출 중 오류: " + e.message);
  }
});

loadQuestions();
</script>
</body>
</html>
