<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>시험 진행 — IT 문제은행</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

<!-- ── 헤더 ────────────────────────────────────────────────────────────────── -->
<header class="site-header quiz-header">
  <div class="container header-inner">
    <a href="/" class="logo">
      <i class="fa-solid fa-server"></i>
      <span>IT 문제은행</span>
    </a>
    <div class="quiz-meta">
      <span id="metaUser"><i class="fa-solid fa-user"></i> <span id="displayName">-</span></span>
      <span id="metaCat"><i class="fa-solid fa-folder"></i> <span id="displayCat">-</span></span>
    </div>
  </div>
</header>

<!-- ── 프로그레스 바 ─────────────────────────────────────────────────────────── -->
<div class="progress-wrap">
  <div class="progress-bar" id="progressBar" style="width:0%"></div>
</div>
<div class="progress-label container">
  <span id="progressText">문제 1 / ?</span>
  <span id="progressPct">0%</span>
</div>

<!-- ── 메인 ────────────────────────────────────────────────────────────────── -->
<main class="container main-content">

  <!-- 로딩 -->
  <div id="loadingBox" class="loading-box">
    <i class="fa-solid fa-spinner fa-spin fa-3x"></i>
    <p>문제를 불러오는 중...</p>
  </div>

  <!-- 문제 카드 -->
  <section id="quizCard" class="quiz-card card" style="display:none">

    <div class="question-header">
      <span class="q-badge" id="qBadge">Q1</span>
      <span class="q-category" id="qCategory"></span>
    </div>

    <p class="question-text" id="questionText"></p>

    <ul class="choices" id="choiceList"></ul>

    <div class="quiz-actions">
      <button id="prevBtn" class="btn btn-secondary" disabled>
        <i class="fa-solid fa-arrow-left"></i> 이전
      </button>
      <button id="nextBtn" class="btn btn-primary" disabled>
        다음 <i class="fa-solid fa-arrow-right"></i>
      </button>
      <button id="submitBtn" class="btn btn-success" style="display:none">
        <i class="fa-solid fa-flag-checkered"></i> 채점하기
      </button>
    </div>
  </section>

  <!-- 에러 메시지 -->
  <div id="errorBox" class="error-box" style="display:none">
    <i class="fa-solid fa-triangle-exclamation fa-2x"></i>
    <p id="errorMsg"></p>
    <a href="/" class="btn btn-primary">처음으로 돌아가기</a>
  </div>

</main>

<script>
/* ── 전역 변수 ───────────────────────────────────────────────────────────────── */
const API_BASE = "/api";

const CATEGORY_LABEL = {
  network: "네트워크",
  infra:   "인프라",
  linux:   "리눅스",
};

// URL에서 카테고리와 limit 파싱
const pathParts = window.location.pathname.split("/");
const CATEGORY  = pathParts[pathParts.length - 1] || sessionStorage.getItem("category");
const params    = new URLSearchParams(window.location.search);
const LIMIT     = parseInt(params.get("limit") || sessionStorage.getItem("questionCount") || "10");
const USER_NAME = sessionStorage.getItem("userName") || "응시자";

let questions   = [];
let current     = 0;
let userAnswers = {};   // { questionId: "A" | "B" | "C" | "D" }

/* ── 메타 정보 렌더 ──────────────────────────────────────────────────────────── */
document.getElementById("displayName").textContent = USER_NAME;
document.getElementById("displayCat").textContent  = CATEGORY_LABEL[CATEGORY] || CATEGORY;

/* ── 문제 로드 ───────────────────────────────────────────────────────────────── */
async function loadQuestions() {
  try {
    const res  = await fetch(`${API_BASE}/questions/${CATEGORY}?limit=${LIMIT}&shuffle=1&source=ai&fresh=1`);
    if (!res.ok) throw new Error(`서버 오류 (${res.status})`);
    const data = await res.json();

    if (!data.questions || data.questions.length === 0) {
      throw new Error("문제를 찾을 수 없습니다.");
    }

    questions = data.questions;
    document.getElementById("loadingBox").style.display = "none";
    document.getElementById("quizCard").style.display   = "block";
    renderQuestion(0);
  } catch (e) {
    document.getElementById("loadingBox").style.display = "none";
    document.getElementById("errorBox").style.display   = "flex";
    document.getElementById("errorMsg").textContent     = e.message;
  }
}

/* ── 문제 렌더 ───────────────────────────────────────────────────────────────── */
function renderQuestion(idx) {
  const q      = questions[idx];
  const total  = questions.length;
  const pct    = Math.round(((idx + 1) / total) * 100);

  // 프로그레스
  document.getElementById("progressBar").style.width = pct + "%";
  document.getElementById("progressText").textContent = `문제 ${idx + 1} / ${total}`;
  document.getElementById("progressPct").textContent  = pct + "%";

  // 배지 / 카테고리
  document.getElementById("qBadge").textContent    = `Q${idx + 1}`;
  document.getElementById("qCategory").textContent = CATEGORY_LABEL[q.category] || q.category;

  // 문제 텍스트
  document.getElementById("questionText").textContent = q.question;

  // 보기 렌더
  const choiceList = document.getElementById("choiceList");
  choiceList.innerHTML = "";
  const savedAnswer = userAnswers[q.id];

  ["A", "B", "C", "D"].forEach(key => {
    const li  = document.createElement("li");
    li.className = "choice-item" + (savedAnswer === key ? " selected" : "");
    li.dataset.key = key;
    li.innerHTML = `
      <span class="choice-key">${key}</span>
      <span class="choice-text">${q.choices[key]}</span>
    `;
    li.addEventListener("click", () => selectChoice(q.id, key));
    choiceList.appendChild(li);
  });

  // 버튼 상태
  document.getElementById("prevBtn").disabled   = idx === 0;
  const nextBtn   = document.getElementById("nextBtn");
  const submitBtn = document.getElementById("submitBtn");

  if (idx === total - 1) {
    nextBtn.style.display   = "none";
    submitBtn.style.display = "inline-flex";
  } else {
    nextBtn.style.display   = "inline-flex";
    submitBtn.style.display = "none";
  }

  // 다음 버튼: 답 선택 여부에 따라
  nextBtn.disabled   = !savedAnswer;
  submitBtn.disabled = !savedAnswer;
}

/* ── 답 선택 ─────────────────────────────────────────────────────────────────── */
function selectChoice(questionId, key) {
  userAnswers[questionId] = key;

  document.querySelectorAll(".choice-item").forEach(li => {
    li.classList.toggle("selected", li.dataset.key === key);
  });

  document.getElementById("nextBtn").disabled   = false;
  document.getElementById("submitBtn").disabled = false;
}

/* ── 이전 / 다음 버튼 ────────────────────────────────────────────────────────── */
document.getElementById("prevBtn").addEventListener("click", () => {
  if (current > 0) { current--; renderQuestion(current); }
});

document.getElementById("nextBtn").addEventListener("click", () => {
  if (current < questions.length - 1) { current++; renderQuestion(current); }
});

/* ── 채점 제출 ───────────────────────────────────────────────────────────────── */
document.getElementById("submitBtn").addEventListener("click", async () => {
  // 미답 문제 확인
  const unanswered = questions.filter(q => !userAnswers[q.id]);
  if (unanswered.length > 0) {
    if (!confirm(`아직 ${unanswered.length}개의 문제에 답하지 않았습니다. 그래도 제출하시겠습니까?`)) return;
  }

  const payload = {
    user_name: USER_NAME,
    category: CATEGORY,
    answers: questions.map(q => ({
      id:       q.id,
      selected: userAnswers[q.id] || "",
    })),
  };

  try {
    const res  = await fetch(`${API_BASE}/submit`, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify(payload),
    });
    const data = await res.json();

    // 결과 저장 후 이동
    sessionStorage.setItem("quizResult", JSON.stringify(data));
    window.location.href = `/result`;
  } catch (e) {
    alert("제출 중 오류가 발생했습니다: " + e.message);
  }
});

/* ── 초기 실행 ───────────────────────────────────────────────────────────────── */
loadQuestions();
</script>
</body>
</html>
