<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT 문제은행 - 이력</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="logo">
        <i class="fa-solid fa-server"></i>
        <span>IT 문제은행</span>
      </a>
      <nav style="display:flex; gap:8px; align-items:center;">
        <button id="backToResultBtn" class="btn btn-sm btn-secondary" style="display:none;">
          <i class="fa-solid fa-chart-bar"></i> 결과 보기
        </button>
        <a href="/history" class="btn btn-sm btn-secondary" id="allHistoryBtn">
          <i class="fa-solid fa-list"></i> 전체 이력
        </a>
        <a href="/" class="btn btn-sm btn-primary"><i class="fa-solid fa-house"></i> 홈</a>
      </nav>
    </div>
  </header>

  <main class="container main-content">
    <section class="card">
      <h2 class="section-title"><i class="fa-solid fa-clock-rotate-left"></i> 내 풀이 이력</h2>
      <div class="form-group">
        <label for="historyUser">이름</label>
        <div style="display:flex; gap:10px; align-items:center;">
          <input id="historyUser" class="form-input" placeholder="이름 입력" maxlength="30" />
          <button id="loadHistoryBtn" class="btn btn-secondary">
            <i class="fa-solid fa-magnifying-glass"></i> 조회
          </button>
        </div>
      </div>
      <div id="historyInfo" class="subtitle"></div>
      <!-- 누적 오답 출제 (조회 후 표시) -->
      <div id="wrongRetrySection" style="display:none; margin:12px 0;">
        <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
          <span id="retryAllWrongLabel" style="color:var(--text-muted); font-size:0.9rem;">누적 오답</span>
          <input id="wrongRetryCount" type="number" min="1" class="form-input"
            style="width:80px; padding:8px 10px; text-align:center;"
            placeholder="문제수" />
          <button id="retryAllWrongBtn" class="btn" style="background:var(--warning);color:#1a1a1a;">
            <i class="fa-solid fa-rotate-right"></i> 오답 출제
          </button>
        </div>
      </div>
      <div id="historyList"></div>
    </section>
  </main>

  <script>
  const API_BASE = "/api";
  const CATEGORY_LABEL = { network: "네트워크", infra: "인프라", linux: "리눅스" };
  const input = document.getElementById("historyUser");
  const info  = document.getElementById("historyInfo");
  const list  = document.getElementById("historyList");
  const qs    = new URLSearchParams(window.location.search);
  const savedName = sessionStorage.getItem("userName") || "";
  input.value = (qs.get("user") || savedName).trim();

  // 결과 데이터가 있으면 "결과로 돌아가기" 버튼 표시
  const hasResult = !!sessionStorage.getItem("quizResult");
  if (hasResult) {
    const backBtn = document.getElementById("backToResultBtn");
    backBtn.style.display = "inline-flex";
    backBtn.addEventListener("click", () => window.location.href = "/result");
  }

  function renderRows(items) {
    if (!items || items.length === 0) {
      list.innerHTML = '<p class="empty-msg">저장된 풀이 이력이 없습니다.</p>';
      return;
    }
    list.innerHTML = items.map((a) => {
      const catLabel = CATEGORY_LABEL[a.category] || a.category;
      const scoreClass = a.score_percent >= 80 ? "badge-gold"
                       : a.score_percent >= 60 ? "badge-correct" : "badge-wrong";
      return `
      <div class="review-card card" style="margin-top:12px">
        <div class="rc-header">
          <span class="rc-num">#${a.attempt_id}</span>
          <span class="rc-cat">${catLabel}</span>
          <span class="badge ${scoreClass}">${a.score_percent}%</span>
        </div>
        <p class="rc-question">총 ${a.total}문제 &nbsp;|&nbsp; 정답 <strong style="color:var(--success)">${a.correct}</strong> &nbsp;|&nbsp; 오답 <strong style="color:var(--danger)">${a.wrong}</strong></p>
        <div class="subtitle" style="margin-top:4px;">응시 시각(KST): ${a.created_at_kst}</div>
        <div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap;">
          <button class="btn btn-secondary btn-sm" onclick="openAttempt('${encodeURIComponent(input.value.trim())}', ${a.attempt_id})">
            <i class="fa-solid fa-eye"></i> 이 시도 다시보기
          </button>
          ${a.wrong > 0 ? `
          <button class="btn btn-sm" style="background:var(--warning);color:#1a1a1a;" onclick="retryWrong('${encodeURIComponent(input.value.trim())}', ${a.attempt_id}, ${a.wrong})">
            <i class="fa-solid fa-rotate-right"></i> 오답 ${a.wrong}개 다시 풀기
          </button>` : ''}
        </div>
      </div>`;
    }).join("");
  }

  async function retryAllWrong() {
    const user = input.value.trim();
    if (!user) return;
    const countInput = document.getElementById("wrongRetryCount");
    const requestCount = parseInt(countInput.value) || 0;
    if (requestCount < 1) {
      alert("출제할 문제 수를 입력해주세요.");
      countInput.focus();
      return;
    }
    try {
      const res  = await fetch(`${API_BASE}/history/${encodeURIComponent(user)}/wrong-ids`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      if (!data.wrong_ids || data.wrong_ids.length === 0) {
        alert("누적 오답 문제가 없습니다.");
        return;
      }
      // 요청 수만큼만 랜덤으로 선택
      const shuffled = data.wrong_ids.sort(() => Math.random() - 0.5);
      const selected = shuffled.slice(0, Math.min(requestCount, shuffled.length));
      sessionStorage.setItem("wrongIds",  JSON.stringify(selected));
      sessionStorage.setItem("retryMode", "1");
      sessionStorage.setItem("category",  "network");
      sessionStorage.setItem("userName",  user);
      window.location.href = `/quiz/network?limit=${selected.length}`;
    } catch (e) {
      alert(`누적 오답 조회 실패: ${e.message}`);
    }
  }

  async function retryWrong(userEncoded, attemptId, wrongCount) {
    try {
      const res  = await fetch(`${API_BASE}/history/${userEncoded}/${attemptId}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      const wrongIds = (data.results || []).filter(r => !r.is_correct).map(r => r.id);
      if (!wrongIds.length) { alert("오답 데이터가 없습니다."); return; }
      sessionStorage.setItem("wrongIds",  JSON.stringify(wrongIds));
      sessionStorage.setItem("retryMode", "1");
      sessionStorage.setItem("category",  data.category || "network");
      sessionStorage.setItem("userName",  data.user_name || input.value.trim());
      window.location.href = `/quiz/${data.category || "network"}?limit=${wrongIds.length}`;
    } catch (e) {
      alert(`오답 출제 실패: ${e.message}`);
    }
  }

  async function openAttempt(userEncoded, attemptId) {
    try {
      const res  = await fetch(`${API_BASE}/history/${userEncoded}/${attemptId}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      sessionStorage.setItem("userName", data.user_name || input.value.trim());
      sessionStorage.setItem("quizResult", JSON.stringify({
        total: data.total, correct: data.correct,
        wrong: data.wrong, score_percent: data.score_percent,
        results: data.results || [],
      }));
      window.location.href = "/review";
    } catch (e) {
      info.textContent = `상세 조회 실패: ${e.message}`;
    }
  }

  async function loadHistory() {
    const user = input.value.trim();
    if (!user) { info.textContent = "이름을 입력해 주세요."; list.innerHTML = ""; return; }
    info.textContent = "불러오는 중...";
    try {
      const res  = await fetch(`${API_BASE}/history/${encodeURIComponent(user)}?limit=30`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      info.textContent = `${data.user_name} 님 이력 ${data.attempts.length}건`;
      renderRows(data.attempts);

      // 누적 오답 버튼 표시
      const totalWrong = data.attempts.reduce((sum, a) => sum + (a.wrong || 0), 0);
      const wrongSection = document.getElementById("wrongRetrySection");
      if (totalWrong > 0) {
        document.getElementById("retryAllWrongLabel").textContent = `누적 오답 약 ${totalWrong}개 중`;
        const countInput = document.getElementById("wrongRetryCount");
        countInput.max   = totalWrong;
        countInput.value = Math.min(10, totalWrong);
        wrongSection.style.display = "block";
        document.getElementById("retryAllWrongBtn").onclick = retryAllWrong;
      } else {
        wrongSection.style.display = "none";
      }
    } catch (e) {
      info.textContent = `조회 실패: ${e.message}`;
      list.innerHTML = "";
    }
  }

  document.getElementById("loadHistoryBtn").addEventListener("click", loadHistory);
  if (input.value) loadHistory();
  </script>
</body>
</html>
