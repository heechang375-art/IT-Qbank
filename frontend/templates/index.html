<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT 문제은행 - 시작</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

<header class="site-header">
  <div class="container">
    <div class="logo">
      <i class="fa-solid fa-server"></i>
      <span>IT 문제은행</span>
    </div>
    <p class="subtitle">문제형식을 먼저 고르고, 원하는 IT 카테고리로 들어가 풀어보세요</p>
  </div>
</header>

<main class="container main-content" style="padding-top:16px; padding-bottom:16px;">
  <div class="home-layout-3col">

    <section class="home-col-left card">
      <label style="font-size:0.85rem;color:var(--text-muted);display:block;margin-bottom:12px;">
        <i class="fa-solid fa-layer-group"></i> 문제형식 선택
      </label>
      <div id="styleList" class="style-list"></div>
      <div class="style-divider">
        <span id="categoryGuide"><i class="fa-solid fa-arrow-down"></i> 문제형식을 먼저 선택하세요</span>
      </div>
      <div id="categoryList" class="category-list">
        <div class="loading-spinner"><i class="fa-solid fa-hand-pointer"></i> 위에서 문제형식을 고르면 카테고리가 열립니다.</div>
      </div>
    </section>

    <section class="home-col-mid card">
      <div class="form-group">
        <label for="userName"><i class="fa-solid fa-user"></i> 이름</label>
        <input type="text" id="userName" class="form-input"
          placeholder="이름을 입력하세요" maxlength="30" autocomplete="off" />
      </div>
      <div class="form-group">
        <label><i class="fa-solid fa-list-ol"></i> 문제 수</label>
        <div class="count-selector">
          <button class="count-btn" data-val="5">5문제</button>
          <button class="count-btn active" data-val="10">10문제</button>
          <button class="count-btn" data-val="15">15문제</button>
          <button class="count-btn" data-val="20">20문제</button>
        </div>
        <input type="hidden" id="questionCount" value="10" />
      </div>
      <div class="form-group">
        <label><i class="fa-solid fa-gauge"></i> 난이도</label>
        <div class="count-selector">
          <button class="diff-btn" data-val="easy"><i class="fa-solid fa-seedling"></i> 쉬움</button>
          <button class="diff-btn active" data-val="mixed"><i class="fa-solid fa-shuffle"></i> 혼합</button>
          <button class="diff-btn" data-val="hard"><i class="fa-solid fa-fire"></i> 어려움</button>
        </div>
        <input type="hidden" id="difficulty" value="mixed" />
      </div>
      <button id="startBtn" class="btn btn-primary btn-lg" style="width:100%;margin-top:auto;" disabled>
        <i class="fa-solid fa-play"></i> 시험 시작
      </button>
    </section>

    <aside class="home-col-right card">
      <label style="font-size:0.85rem;color:var(--text-muted);display:block;margin-bottom:16px;">
        <i class="fa-solid fa-circle-info"></i> 카테고리 안내
      </label>
      <div class="cat-info-panel-v">
        <div class="cat-info-card programming">
          <div class="cat-info-icon"><i class="fa-solid fa-code"></i></div>
          <div>
            <strong>개발 기초</strong>
            <p>프로그래밍, 웹개발, 데이터베이스처럼 입문자와 실무자가 많이 푸는 축을 먼저 배치했습니다.</p>
          </div>
        </div>
        <div class="cat-info-card cloud">
          <div class="cat-info-icon"><i class="fa-solid fa-cloud"></i></div>
          <div>
            <strong>운영과 클라우드</strong>
            <p>네트워크, 리눅스, 클라우드, 쿠버네티스를 별도 주제로 분리해 실무 학습 흐름을 살렸습니다.</p>
          </div>
        </div>
        <div class="cat-info-card security">
          <div class="cat-info-icon"><i class="fa-solid fa-shield-halved"></i></div>
          <div>
            <strong>보안</strong>
            <p>인증, 취약점, 암호화, 운영 보안처럼 범용적으로 많이 풀리는 영역을 독립 카테고리로 뒀습니다.</p>
          </div>
        </div>
      </div>
    </aside>

  </div>
</main>

<footer class="site-footer">
  <div class="container">
    <p><i class="fa-solid fa-code"></i> IT 문제은행 &copy; 2026 | Flask + MySQL</p>
  </div>
</footer>

<script>
const API_BASE = "/api";
const QUESTION_STYLE_META = {
  mixed: { label: "형식 혼합", icon: "fa-shuffle", desc: "개념형, 실무형, 자격시험 스타일을 섞어서 출제합니다." },
  concept: { label: "개념형", icon: "fa-lightbulb", desc: "핵심 개념과 정의를 빠르게 점검하는 기본형 문제입니다." },
  practical: { label: "실무형", icon: "fa-screwdriver-wrench", desc: "운영, 설계, 장애 대응처럼 현업 맥락을 담은 문제입니다." },
  cert: { label: "자격시험 스타일", icon: "fa-file-pen", desc: "자격시험 분위기를 참고한 시나리오형 객관식 문제입니다." },
};
const CATEGORY_META = {
  programming: { label: "프로그래밍", icon: "fa-code", color: "programming", desc: "Python, Java, JavaScript, 문법, 객체지향, 자료구조, 디버깅 등 개발 전반" },
  web: { label: "웹개발", icon: "fa-globe", color: "web", desc: "HTTP, REST API, 프론트엔드, 백엔드, 인증, 쿠키/세션 등 웹 개발 핵심" },
  database: { label: "데이터베이스", icon: "fa-database", color: "database", desc: "SQL, 정규화, 인덱스, 트랜잭션, JOIN, 모델링, 튜닝 등 데이터베이스 핵심" },
  network: { label: "네트워크", icon: "fa-network-wired", color: "network", desc: "OSI, TCP/IP, 라우팅, 스위칭, DNS, DHCP, 로드밸런싱 등 네트워크 전반" },
  linux: { label: "리눅스", icon: "fa-brands fa-linux", color: "linux", desc: "명령어, 파일 시스템, 권한, 서비스, 프로세스, 로그 분석 등 리눅스 운영 전반" },
  cloud: { label: "클라우드", icon: "fa-cloud", color: "cloud", desc: "AWS, Azure, GCP, 가상화, 스토리지, IaC, 모니터링 등 클라우드 운영 전반" },
  kubernetes: { label: "쿠버네티스", icon: "fa-dharmachakra", color: "kubernetes", desc: "컨테이너, Pod, Deployment, Service, Ingress, 롤링업데이트, 장애 대응 등 실무 중심" },
  security: { label: "보안", icon: "fa-shield-halved", color: "security", desc: "인증, 인가, 암호화, 취약점, 네트워크 보안, 시스템 보안 등 보안 기초 전반" },
};
const CAT_DESC = {
  all: { label: "전체 혼합", icon: "fa-solid fa-shuffle", color: "mixed", desc: "선택한 문제형식 안에서 모든 IT 카테고리를 섞어 출제합니다." },
  programming: { label: "프로그래밍", icon: "fa-solid fa-code", color: "programming", desc: "Python, Java, JavaScript, 문법, 객체지향, 자료구조, 디버깅 등 개발 전반" },
  web: { label: "웹개발", icon: "fa-solid fa-globe", color: "web", desc: "HTTP, REST API, 프론트엔드, 백엔드, 인증, 쿠키/세션 등 웹 개발 핵심" },
  database: { label: "데이터베이스", icon: "fa-solid fa-database", color: "database", desc: "SQL, 정규화, 인덱스, 트랜잭션, JOIN, 모델링, 튜닝 등 데이터베이스 핵심" },
  network: { label: "네트워크", icon: "fa-solid fa-network-wired", color: "network", desc: "OSI, TCP/IP, 라우팅, 스위칭, DNS, DHCP, 로드밸런싱 등 네트워크 전반" },
  linux: { label: "리눅스", icon: "fa-brands fa-linux", color: "linux", desc: "명령어, 파일 시스템, 권한, 서비스, 프로세스, 로그 분석 등 리눅스 운영 전반" },
  cloud: { label: "클라우드", icon: "fa-solid fa-cloud", color: "cloud", desc: "AWS, Azure, GCP, 가상화, 스토리지, IaC, 모니터링 등 클라우드 운영 전반" },
  kubernetes: { label: "쿠버네티스", icon: "fa-solid fa-dharmachakra", color: "kubernetes", desc: "컨테이너, Pod, Deployment, Service, Ingress, 롤링업데이트, 장애 대응 등 실무 중심" },
  security: { label: "보안", icon: "fa-solid fa-shield-halved", color: "security", desc: "인증, 인가, 암호화, 취약점, 네트워크 보안, 시스템 보안 등 보안 기초 전반" },
};

let selectedStyle = null;
let selectedCategory = null;
let selectedCount = 10;
let selectedDiff = "mixed";
let categoryData = [];

function renderStyleOptions() {
  const list = document.getElementById("styleList");
  list.innerHTML = "";
  Object.entries(QUESTION_STYLE_META).forEach(([key, meta]) => {
    const btn = document.createElement("button");
    btn.className = "style-btn";
    btn.dataset.style = key;
    btn.innerHTML = `
      <i class="fa-solid ${meta.icon}"></i>
      <span class="style-copy">
        <strong>${meta.label}</strong>
        <small>${meta.desc}</small>
      </span>
    `;
    btn.addEventListener("click", () => selectStyle(key, btn));
    list.appendChild(btn);
  });
}

async function loadCategories() {
  const list = document.getElementById("categoryList");
  list.innerHTML = '<div class="loading-spinner"><i class="fa-solid fa-spinner fa-spin"></i> 로딩 중...</div>';
  try {
    const res  = await fetch(`${API_BASE}/categories`);
    if (!res.ok) throw new Error(`서버 응답 오류 (HTTP ${res.status})`);
    const data = await res.json();
    if (!data.categories || data.categories.length === 0) throw new Error("등록된 카테고리가 없습니다.");
    categoryData = data.categories;
    renderCategories();
  } catch (e) {
    const is503 = e.message.includes("503");
    list.innerHTML = `
      <p class="error-msg">
        <i class="fa-solid fa-triangle-exclamation"></i>
        ${is503
          ? "백엔드 서버가 아직 시작 중입니다. 잠시 후 다시 시도해주세요."
          : "카테고리 로드 실패: " + e.message}
      </p>
      <button onclick="loadCategories()" class="btn btn-secondary" style="margin-top:12px">
        <i class="fa-solid fa-rotate-right"></i> 다시 시도
      </button>`;
    if (is503) setTimeout(loadCategories, 5000);
  }
}

function renderCategories() {
  const list = document.getElementById("categoryList");
  const guide = document.getElementById("categoryGuide");
  if (!selectedStyle) {
    guide.innerHTML = '<i class="fa-solid fa-arrow-down"></i> 문제형식을 먼저 선택하세요';
    list.innerHTML = '<div class="loading-spinner"><i class="fa-solid fa-hand-pointer"></i> 위에서 문제형식을 고르면 카테고리가 열립니다.</div>';
    return;
  }

  const styleLabel = QUESTION_STYLE_META[selectedStyle]?.label || selectedStyle;
  guide.innerHTML = `<i class="fa-solid fa-folder-open"></i> ${styleLabel}으로 풀 카테고리를 고르세요`;
  list.innerHTML = "";

  const mixedBtn = document.createElement("button");
  mixedBtn.className = "category-btn mixed-cat";
  mixedBtn.dataset.cat = "all";
  mixedBtn.innerHTML = `
    <i class="fa-solid fa-shuffle" style="color:var(--primary-light);font-size:1.2rem;width:24px;text-align:center"></i>
    <span class="cat-label">전체 혼합</span>
    <span class="db-badge db-full"><i class="fa-solid fa-layer-group"></i> ${styleLabel}</span>
  `;
  mixedBtn.addEventListener("click", () => selectCategory("all", mixedBtn));
  list.appendChild(mixedBtn);

  categoryData.forEach(cat => {
    const meta = CATEGORY_META[cat.name] || {
      label: cat.label || cat.name,
      icon: cat.icon || "fa-folder",
      color: cat.theme || "",
      desc: cat.description || "",
    };
    const btn = document.createElement("button");
    btn.className = `category-btn ${meta.color}`;
    btn.dataset.cat = cat.name;

    let dbBadge = "";
    if (cat.count >= 150) {
      dbBadge = `<span class="db-badge db-full"><i class="fa-solid fa-database"></i> ${cat.count}문제</span>`;
    } else if (cat.count >= 100) {
      dbBadge = `<span class="db-badge db-mid"><i class="fa-solid fa-database"></i> ${cat.count}문제</span>`;
    } else if (cat.count >= 50) {
      dbBadge = `<span class="db-badge db-low"><i class="fa-solid fa-database"></i> ${cat.count}문제</span>`;
    } else {
      dbBadge = `<span class="db-badge db-empty"><i class="fa-solid fa-wand-magic-sparkles"></i> ${cat.count}문제 · AI병행</span>`;
    }

    const iconClass = meta.icon.includes(" ") ? meta.icon : `fa-solid ${meta.icon}`;
    btn.innerHTML = `
      <i class="${iconClass}"></i>
      <span class="cat-label">${cat.label || meta.label}</span>
      ${dbBadge}
    `;
    btn.addEventListener("click", () => selectCategory(cat.name, btn));
    list.appendChild(btn);
  });
}

function isMobileView() {
  return window.innerWidth <= 900;
}

function showCatPopup(name, anchorBtn) {
  const existing = document.getElementById("catPopup");
  if (existing) {
    if (existing.dataset.cat === name) {
      existing.remove();
      return;
    }
    existing.remove();
  }

  const info = CAT_DESC[name];
  if (!info) return;

  const popup = document.createElement("div");
  popup.id = "catPopup";
  popup.dataset.cat = name;
  popup.className = `cat-popup cat-popup-${info.color}`;
  popup.innerHTML = `
    <i class="${info.icon}"></i>
    <div>
      <strong>${info.label}</strong>
      <p>${info.desc}</p>
    </div>
    <button class="cat-popup-close" onclick="document.getElementById('catPopup')?.remove()">
      <i class="fa-solid fa-xmark"></i>
    </button>
  `;

  anchorBtn.parentNode.insertBefore(popup, anchorBtn.nextSibling);

  setTimeout(() => {
    document.addEventListener("click", function closePop(e) {
      if (!popup.contains(e.target) && e.target !== anchorBtn) {
        popup.remove();
        document.removeEventListener("click", closePop);
      }
    });
  }, 100);
}

function selectStyle(name, btn) {
  document.querySelectorAll(".style-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  selectedStyle = name;
  selectedCategory = null;
  renderCategories();
  checkReady();
}

function selectCategory(name, btn) {
  document.querySelectorAll(".category-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  selectedCategory = name;
  checkReady();
  if (isMobileView()) {
    showCatPopup(name, btn);
  }
}

document.querySelectorAll(".count-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".count-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    selectedCount = parseInt(btn.dataset.val, 10);
    document.getElementById("questionCount").value = selectedCount;
    checkReady();
  });
});

document.querySelectorAll(".diff-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".diff-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    selectedDiff = btn.dataset.val;
    document.getElementById("difficulty").value = selectedDiff;
  });
});

function checkReady() {
  const name = document.getElementById("userName").value.trim();
  document.getElementById("startBtn").disabled = !(name && selectedStyle && selectedCategory);
}
document.getElementById("userName").addEventListener("input", checkReady);

document.getElementById("startBtn").addEventListener("click", () => {
  const name = document.getElementById("userName").value.trim();
  if (!name || !selectedStyle || !selectedCategory) return;

  sessionStorage.setItem("userName", name);
  sessionStorage.setItem("questionStyle", selectedStyle);
  sessionStorage.setItem("category", selectedCategory);
  sessionStorage.setItem("questionCount", String(selectedCount));
  sessionStorage.setItem("difficulty", selectedDiff);

  if (selectedCategory === "all") {
    window.location.href = `/quiz/all?limit=${selectedCount}&difficulty=${selectedDiff}&style=${selectedStyle}`;
  } else {
    window.location.href = `/quiz/${selectedCategory}?limit=${selectedCount}&difficulty=${selectedDiff}&style=${selectedStyle}`;
  }
});

renderStyleOptions();
loadCategories();
</script>
</body>
</html>
