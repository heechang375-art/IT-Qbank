# ──────────────────────────────────────────────────────────────────
# mysql-service.yaml
# MySQL을 클러스터 내부에만 노출하는 ClusterIP 서비스
# backend-deployment에서 DB_HOST=mysql-service 로 접근
# ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: hc-quiz-bank
  labels:
    app: mysql
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
      protocol: TCP
  type: ClusterIP    # ?대윭?ㅽ꽣 ?대??먯꽌留??묎렐 (?몃? ?몄텧 X)


