# ──────────────────────────────────────────────────────────────────────────────
# Secret: DB 접속 정보 (민감 데이터)
# 사용 전 Base64 인코딩 값으로 교체하세요.
#
# 인코딩 방법:
#   echo -n "실제값" | base64
#
# 예시:
#   echo -n "quizpassword" | base64  →  cXVpenBhc3N3b3Jk
#   echo -n "rootpassword" | base64  →  cm9vdHBhc3N3b3Jk
#   echo -n "quizuser"     | base64  →  cXVpenVzZXI=
#   echo -n "quizdb"       | base64  →  cXVpemRi
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: quiz-secret
  namespace: quiz-bank
type: Opaque
data:
  DB_USER:              cXVpenVzZXI=        # quizuser
  DB_PASSWORD:          cXVpenBhc3N3b3Jk    # quizpassword
  DB_NAME:              cXVpemRi            # quizdb
  MYSQL_ROOT_PASSWORD:  cm9vdHBhc3N3b3Jk   # rootpassword
  GEMINI_API_KEY:       REPLACE_WITH_BASE64_GEMINI_KEY
