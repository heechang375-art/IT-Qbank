apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: quiz-bank
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      # MySQL이 Ready 상태가 될 때까지 대기
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mysql-service 3306; do
                echo "MySQL 대기중..."
                sleep 3
              done
              echo "MySQL 연결 확인 완료"
      containers:
        - name: backend
          # ⚠️ YOUR_DOCKERHUB_USERNAME을 실제 값으로 변경하세요
          image: YOUR_DOCKERHUB_USERNAME/quiz-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: quiz-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: quiz-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: quiz-secret
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: quiz-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: quiz-secret
                  key: DB_PASSWORD
            - name: FLASK_DEBUG
              valueFrom:
                configMapKeyRef:
                  name: quiz-config
                  key: FLASK_DEBUG
            - name: USE_SQLITE_FALLBACK
              valueFrom:
                configMapKeyRef:
                  name: quiz-config
                  key: USE_SQLITE_FALLBACK
            - name: PURGE_DEFAULT_ON_BOOT
              valueFrom:
                configMapKeyRef:
                  name: quiz-config
                  key: PURGE_DEFAULT_ON_BOOT
            - name: GEMINI_MODEL
              valueFrom:
                configMapKeyRef:
                  name: quiz-config
                  key: GEMINI_MODEL
            - name: GEMINI_API_URL
              valueFrom:
                configMapKeyRef:
                  name: quiz-config
                  key: GEMINI_API_URL
            - name: GEMINI_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: quiz-config
                  key: GEMINI_TIMEOUT
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: quiz-secret
                  key: GEMINI_API_KEY
            - name: PORT
              value: "5000"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
