## ─────────────────────────────────────────────────────────────
## Backend Deployment
## 수정사항:
##   1. DB_WAIT_RETRIES: 20, DB_WAIT_DELAY: 5 으로 증가
##      (MySQL 초기화 시간이 충분히 확보되도록)
##   2. readinessProbe initialDelaySeconds: 45로 증가
##      (MySQL 준비 전에 readiness 실패로 재시작되는 문제 방지)
##   3. livenessProbe initialDelaySeconds: 90으로 증가
## ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: hc-quiz-bank
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      # MySQL가 먼저 Ready 상태가 될 때까지 대기
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for MySQL at mysql-service:3306..."
              until nc -z mysql-service 3306; do
                echo "MySQL not ready, retrying in 5s..."
                sleep 5
              done
              echo "MySQL is ready."
      containers:
        - name: backend
          image: collapse/quiz-backend:v0.6.2
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_PASSWORD
            - name: FLASK_DEBUG
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: FLASK_DEBUG
            - name: USE_SQLITE_FALLBACK
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: USE_SQLITE_FALLBACK
            - name: PURGE_DEFAULT_ON_BOOT
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: PURGE_DEFAULT_ON_BOOT
            - name: PURGE_SHORT_ON_BOOT
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: PURGE_SHORT_ON_BOOT
            - name: GEMINI_MODEL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: GEMINI_MODEL
            - name: GEMINI_API_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: GEMINI_API_URL
            - name: GEMINI_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: GEMINI_TIMEOUT
            - name: AI_REQUEST_BUDGET_SEC
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: AI_REQUEST_BUDGET_SEC
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: GEMINI_API_KEY
            - name: PORT
              value: "5000"
            - name: DB_WAIT_RETRIES
              value: "20"
            - name: DB_WAIT_DELAY
              value: "5"
          resources:
            requests:
              memory: "128Mi"
              cpu: "75m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
