## ─────────────────────────────────────────────────────────────
## Backend Deployment
## 수정사항:
##   1. ADMIN_SECRET_KEY 환경변수 추가 (관리자 API 인증용)
##   2. DB_WAIT_RETRIES: 20, DB_WAIT_DELAY: 5
##   3. readinessProbe initialDelaySeconds: 45
##   4. livenessProbe initialDelaySeconds: 90
## ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: hc-quiz-bank
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: collapse/quiz-backend:v0.7.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_PASSWORD
            - name: FLASK_DEBUG
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: FLASK_DEBUG
            - name: USE_SQLITE_FALLBACK
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: USE_SQLITE_FALLBACK
            - name: GEMINI_MODEL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: GEMINI_MODEL
            - name: GEMINI_API_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: GEMINI_API_URL
            - name: GEMINI_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: GEMINI_TIMEOUT
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: GEMINI_API_KEY
            # [신규] 관리자 API 인증 키
            - name: ADMIN_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: ADMIN_SECRET_KEY
            - name: PORT
              value: "5000"
            - name: DB_WAIT_RETRIES
              value: "20"
            - name: DB_WAIT_DELAY
              value: "5"
          resources:
            requests:
              memory: "128Mi"
              cpu: "75m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
