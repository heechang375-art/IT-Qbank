## ─────────────────────────────────────────────────────────────
## PVC  (mysql-pvc)
## 수정사항:
##   - storageClassName: "local-path" 명시
##     (Rancher Desktop 기본 StorageClass = local-path)
##     다른 클러스터 사용 시 해당 클러스터의 StorageClass 이름으로 변경
## ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: hc-quiz-bank
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
