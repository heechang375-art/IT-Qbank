apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: quiz-gateway
  namespace: hc-quiz-bank
spec:
  gatewayClassName: traefik
  listeners:
    - name: http
      protocol: HTTP
      port: 8000
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: quiz-route
  namespace: hc-quiz-bank
spec:
  parentRefs:
    - name: quiz-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: backend-service
          port: 5000
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend-service
          port: 8080
