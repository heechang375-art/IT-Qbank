apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: quiz-bank
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
    spec:
      initContainers:
        - name: wait-for-backend
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z backend-service 5000; do
                echo "Backend 대기중..."
                sleep 3
              done
              echo "Backend 연결 확인 완료"
      containers:
        - name: frontend
          # ⚠️ YOUR_DOCKERHUB_USERNAME을 실제 값으로 변경하세요
          image: YOUR_DOCKERHUB_USERNAME/quiz-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: BACKEND_URL
              valueFrom:
                configMapKeyRef:
                  name: quiz-config
                  key: BACKEND_URL
            - name: FLASK_DEBUG
              valueFrom:
                configMapKeyRef:
                  name: quiz-config
                  key: FLASK_DEBUG
            - name: FRONTEND_PROXY_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: quiz-config
                  key: FRONTEND_PROXY_TIMEOUT
            - name: PORT
              value: "8080"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
