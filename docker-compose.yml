# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml
# 서비스 구성:
#   db        - MySQL 8.0
#   backend   - Flask API (포트 5000)
#   frontend  - Flask Frontend + Proxy (포트 8080)
#
# 사용법:
#   docker-compose up -d --build
#   브라우저: http://localhost:8080
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── MySQL 데이터베이스 ──────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: quiz_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE:      ${DB_NAME:-quizdb}
      MYSQL_USER:          ${DB_USER:-quizuser}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-quizpassword}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - quiz_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "${DB_USER:-quizuser}", "-p${DB_PASSWORD:-quizpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ── Flask 백엔드 API ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${DOCKER_HUB_USERNAME:-yourname}/quiz-backend:${IMAGE_TAG:-latest}
    container_name: quiz_backend
    restart: unless-stopped
    environment:
      DB_HOST:      db
      DB_PORT:      3306
      DB_NAME:      ${DB_NAME:-quizdb}
      DB_USER:      ${DB_USER:-quizuser}
      DB_PASSWORD:  ${DB_PASSWORD:-quizpassword}
      FLASK_DEBUG:  ${FLASK_DEBUG:-false}
      PORT:         5000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - quiz_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Flask 프론트엔드 ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ${DOCKER_HUB_USERNAME:-yourname}/quiz-frontend:${IMAGE_TAG:-latest}
    container_name: quiz_frontend
    restart: unless-stopped
    environment:
      BACKEND_URL:  http://backend:5000
      FLASK_DEBUG:  ${FLASK_DEBUG:-false}
      PORT:         8080
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_started
    networks:
      - quiz_net

# ── 볼륨 ────────────────────────────────────────────────────────────────────
volumes:
  db_data:
    driver: local

# ── 네트워크 ─────────────────────────────────────────────────────────────────
networks:
  quiz_net:
    driver: bridge
